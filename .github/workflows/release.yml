name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Package release artifacts
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          minecraft_version="$(sed -n 's/^minecraft_version=//p' gradle.properties)"
          runtime_jar="$(find build/libs -maxdepth 1 -name 'imears-*.jar' ! -name '*-sources.jar' -print -quit)"
          sources_jar="$(find build/libs -maxdepth 1 -name 'imears-*-sources.jar' -print -quit)"

          mkdir -p dist
          cp "$runtime_jar" "dist/imears-${version}-mc${minecraft_version}.jar"
          cp "$sources_jar" "dist/imears-${version}-sources.jar"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dist/*.jar
